{% extends "base.html" %}
{% block title %}Delete Scenario — RetireSim{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl shadow p-8 text-center">
    <div class="text-4xl mb-4">🗑️</div>
    <h1 class="text-xl font-bold text-gray-900 mb-2">Delete "{{ scenario.name }}"?</h1>
    <p class="text-sm text-gray-500 mb-6">This will also delete all simulation results for this scenario. This cannot be undone.</p>
    <form method="post" class="flex flex-wrap gap-3">
      {% csrf_token %}
      <button type="submit" class="flex-1 bg-red-600 text-white font-semibold py-2.5 rounded-lg hover:bg-red-700 transition">Yes, Delete</button>
      <a href="{% url 'simulations:list' %}" class="flex-1 text-center border border-gray-300 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 transition">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
