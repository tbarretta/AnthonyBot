<!-- HTMX polling partial: shown while Monte Carlo is running -->
<div id="mc-status"
     hx-get="{% url 'simulations:result_status' result.pk %}"
     hx-trigger="every 2s"
     hx-target="#mc-status"
     hx-swap="outerHTML"
     class="flex flex-col items-center justify-center py-12 text-gray-500">
  <svg class="animate-spin h-10 w-10 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
  </svg>
  <p class="text-lg font-medium">Running Monte Carlo simulation…</p>
  <p class="text-sm mt-1">{{ scenario.mc_iterations }} iterations · this may take a few seconds</p>
</div>
