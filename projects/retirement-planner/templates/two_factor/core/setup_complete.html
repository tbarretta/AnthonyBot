{% extends "base.html" %}

{% block title %}2FA Enabled — RetireSim{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
  <div class="bg-white rounded-xl shadow-md p-8 text-center">
    <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-4">Setup Complete!</h1>
    <p class="text-gray-700 mb-6">Congratulations, you've successfully enabled two-factor authentication.</p>
    <a href="{% url 'two_factor:profile' %}" class="inline-block bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-indigo-700 transition">Back to Security Settings</a>
  </div>
</div>
{% endblock %}
