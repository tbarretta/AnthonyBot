{% extends "base.html" %}
{% block title %}Password Reset — RetireSim{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-md p-8 w-full max-w-md text-center">
    <div class="text-4xl mb-4">✅</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Password reset complete</h1>
    <p class="text-gray-500 mb-6">Your password has been set. You can now sign in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="inline-block bg-indigo-600 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition text-sm">
      Sign In
    </a>
  </div>
</div>
{% endblock %}
