{% extends "base.html" %}
{% block title %}Forgot Password — Gift Registry{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🔑</div>
      <h1 class="text-2xl font-bold text-white">Reset your password</h1>
      <p class="text-gray-500 text-sm mt-1">We'll email you a link to get back in.</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-6">
          <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-400 mb-1">Email address</label>
          <input type="email" name="email" id="{{ form.email.id_for_label }}"
            value="{{ form.email.value|default:'' }}"
            placeholder="you@example.com" autofocus
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-[var(--color-primary)] focus:ring-1 focus:ring-[var(--color-primary)]">
          {% for error in form.email.errors %}
          <p class="text-red-400 text-xs mt-1">{{ error }}</p>
          {% endfor %}
        </div>

        <button type="submit"
          class="w-full bg-[var(--color-primary)] hover:bg-[var(--color-primary-dark)] text-white font-medium py-2 rounded-lg transition-colors">
          Send reset link
        </button>
      </form>
    </div>

    <p class="text-center mt-6">
      <a href="{% url 'login' %}" class="text-gray-600 hover:text-gray-400 text-sm">← Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
