{% extends "base.html" %}
{% block title %}Check Your Email — Gift Registry{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm text-center">
    <div class="text-5xl mb-4">📬</div>
    <h1 class="text-2xl font-bold text-white mb-2">Check your inbox</h1>
    <p class="text-gray-400 text-sm mb-6">
      We sent a verification link to your email address. Click the link to activate your account.
    </p>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-6 text-left">
      <p class="text-sm text-gray-500 mb-3">Didn't get the email?</p>
      <form method="post" action="{% url 'resend_verification' %}">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email address"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-[var(--color-primary)] focus:ring-1 focus:ring-[var(--color-primary)] mb-3">
        <button type="submit"
          class="w-full border border-gray-700 hover:border-gray-500 text-gray-300 hover:text-white font-medium py-2 rounded-lg transition-colors text-sm">
          Resend verification email
        </button>
      </form>
    </div>

    <a href="{% url 'login' %}" class="text-gray-600 hover:text-gray-400 text-sm">← Back to sign in</a>
  </div>
</div>
{% endblock %}
